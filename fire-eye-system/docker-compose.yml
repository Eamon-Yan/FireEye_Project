version: '3.8'

services:
  # Neo4j 图数据库
  neo4j:
    image: neo4j:5.15-community
    container_name: fire-eye-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=2G
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
    networks:
      - fire-eye-network
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: fire-eye-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - fire-eye-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # 后端 API 服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fire-eye-backend
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    # volumes:
    #   - ./backend:/app
    #   - backend_uploads:/app/uploads
    depends_on:
      - neo4j
      - redis
    networks:
      - fire-eye-network
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - __pycache__/
            - .pytest_cache/
            - .mypy_cache/

  # 前端 Web 应用
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fire-eye-frontend
    ports:
      - "5000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=
    # volumes:
    #   - ./frontend:/app
    #   - /app/node_modules
    #   - /app/.next
    depends_on:
      - backend
    networks:
      - fire-eye-network
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/
            - .next/

 # 新增 AstrBot 服务
  astrbot:
    image: soulter/astrbot:latest
    container_name: astrbot
    ports:
      - "6125:6185"  # 网页管理后台端口
    volumes:
      - ./astrbot_data:/AstrBot/data  # 把插件和配置挂载出来，方便你放 Agent 写的代码
    restart: unless-stopped
    depends_on:
      - redis
      - neo4j
      - backend
    networks:
      - fire-eye-network
      - default
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  redis_data:
  backend_uploads:

networks:
  fire-eye-network:
    driver: bridge
