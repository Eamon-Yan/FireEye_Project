# Fire-Eye AstrBot Plugin Configuration (Docker)

# Fire-Eye 后端 API 配置
fire_eye:
  api_url: "http://fire-eye-backend:8000/api/v1"
  api_key: "change-me-in-production"
  timeout: 30  # 请求超时时间（秒）
  retries: 3   # 失败重试次数

# 会话管理配置
session:
  ttl: 1800  # 会话过期时间（秒），30分钟

# 请求队列配置
request_queue:
  max_concurrent: 5   # 最大并发请求数
  max_queue_size: 20  # 队列最大长度

# 意图检测配置（暂未启用）
intent_detection:
  enabled: false  # 是否启用自动意图检测

# 文件上传配置
file_upload:
  retain_files_on_server: false  # 是否在服务器保留文件
  temp_dir: "/tmp/fireeye"       # 临时文件目录
  max_file_size: 10485760        # 最大文件大小（字节），10MB

# 日志配置
logging:
  level: "INFO"                      # 日志级别: DEBUG, INFO, WARNING, ERROR
  file: "/AstrBot/data/logs/fireeye.log"  # 日志文件路径
  max_size: 10485760                 # 单个日志文件最大大小（字节），10MB
  backup_count: 5                    # 保留的日志文件数量
